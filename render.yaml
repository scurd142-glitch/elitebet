# Render.com — deploy backend only (frontend stays on Vercel)
# Dashboard: New → Blueprint → connect repo
services:
  - type: web
    name: writersnite-api
    runtime: node
    # Remove rootDir to use project root for workspace support
    buildCommand: npm install && npm run build --workspace=@writersnite/shared && cd backend && npx prisma generate && npm run build
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: SITE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
